# Redis Configuration — URL Shortener
# ─────────────────────────────────────────────────────────────────────────────

# Persistence: Append-Only File (AOF) — durability over pure performance
# In production, use RDB snapshots + AOF together
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec           # fsync every second (good balance of safety/perf)
no-appendfsync-on-rewrite no

# RDB Snapshots (failsafe backup)
save 3600 1                    # Save if at least 1 key changed in 3600s
save 300 100                   # Save if at least 100 keys changed in 300s
save 60 10000                  # Save if at least 10000 keys changed in 60s

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru   # Evict least-recently-used keys when full
                               # Appropriate for cache workloads

# Performance
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# Networking
tcp-keepalive 300
timeout 0                      # Don't close idle client connections
tcp-backlog 511

# Logging
loglevel notice
logfile ""                     # Log to stdout (Docker captures it)

# Slow log: record commands that take longer than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-tracking yes
latency-tracking-info-percentiles 50 99 99.9
